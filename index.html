<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Learning Hub - ELH</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e27;
      font-family: Arial, sans-serif;
    }
    
    /* Splash Screen */
    #splash-screen {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0e27;
      transition: opacity 0.8s ease-out;
    }
    
    #splash-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    #splash-screen.hide {
      opacity: 0;
      pointer-events: none;
    }
    
    /* Register Screen */
    #main-app {
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      background: #0a0e27;
    }
    
    #main-app img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      max-width: 500px;
    }
    
    #main-app.show {
      display: flex;
    }
  </style>
</head>
<body>
  <!-- شاشة الـ Welcome/Splash -->
  <div id="splash-screen">
    <img src="assets/images/welcome.jpg" alt="Welcome to English Learning Hub">
  </div>

  <!-- شاشة الـ Register -->
  <div id="main-app">
    <img src="assets/images/register.jpg" alt="Register Screen">
  </div>

  <script>
    // بعد 3 ثواني يخفي الـ splash ويظهر الـ register
    setTimeout(() => {
      const splash = document.getElementById('splash-screen');
      const mainApp = document.getElementById('main-app');
      
      splash.classList.add('hide');
      mainApp.classList.add('show');
    }, 3000);
  </script>
</body>
</html>
